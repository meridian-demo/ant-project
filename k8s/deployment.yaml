apiVersion: apps/v1
kind: Deployment
metadata:
  name: ant-project
  labels:
    app: ant-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ant-project
  template:
    metadata:
      labels:
        app: ant-project
    spec:
      containers:
        - name: ant-project
          image: meridian/ant-project:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

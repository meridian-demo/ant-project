name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: meridian

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Ant 1.9.16
        run: |
          curl -sL https://archive.apache.org/dist/ant/binaries/apache-ant-1.9.16-bin.tar.gz | tar xz -C /tmp
          echo "/tmp/apache-ant-1.9.16/bin" >> $GITHUB_PATH

      - name: Debug PATH before ant
        run: |
          echo "PATH=$PATH"
          echo "JAVA_HOME=$JAVA_HOME"
          which ant
          ant -version

      - name: Build with Ant
        run: ant build

      - name: Build Docker image
        run: docker build -t meridian/ant-project:${{ github.sha }} .

      - name: Snyk test
        run: snyk test --all-projects || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
